# Example values for production environment with AWS S3
replicaCount: 3

image:
  repository: anvitraai/shilp-server
  pullPolicy: IfNotPresent
  tag: "v0.9.2"

env:
  aws:
    # Use S3 for storage - no persistent volume needed
    enableStorage: "true"
    region: "ap-south-1"
    s3UploadBucket: "anvitra-local-upload-bucket"
    s3DbBucket: "anvitra-local-shilp-db"
    enableEmbeddingModels: "false"
    defaultEmbeddingModel: ""
  enableMetrics: "true"
  autoLoadCollections: "go_stocks,nasdaq_stocks"
  shilpFilePath: "/data/shilp"
  uploadFilePath: "/data/upload"
  logLevel: "info"

# AWS credentials from secret
awsCredentials:
  existingSecret: "shilp-server-aws-credentials"
  accessKeyIdKey: "accessKeyId"
  secretAccessKeyKey: "secretAccessKey"

server:
  existingSecret: "shilp-server-credentials"
  encryptKeyKey: "encryptionKey"

# No persistent volume needed when using S3
persistence:
  enabled: false

service:
  type: ClusterIP
  port: 3000

resources:
  requests:
    cpu: 2000m
    memory: 4Gi
  limits:
    cpu: 2500m
    memory: 5Gi

# Node selection for production - use dedicated nodes
nodeSelector:
  workload: shilp-server

# Tolerations for dedicated shilp-server nodes
# This ensures only shilp-server pods run on tainted nodes
tolerations:
  - key: "app"
    operator: "Equal"
    value: "shilp-server"
    effect: "NoSchedule"
  - key: "dedicated"
    operator: "Equal"
    value: "shilp"
    effect: "NoExecute"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - shilp-server
          topologyKey: kubernetes.io/hostname
