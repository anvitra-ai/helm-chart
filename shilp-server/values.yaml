# Default values for shilp-server.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: anvitraai/shilp-server
  pullPolicy: IfNotPresent
  tag: "v0.9.2"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 2500m
    memory: 5Gi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

# Node selector for label-based node selection
# Example: Schedule pods only on nodes with specific labels
nodeSelector: {}
# disktype: ssd
# workload: shilp-server

# Tolerations allow pods to schedule on nodes with matching taints
# Use this to ensure nodes dedicated to shilp-server don't run other workloads
# and vice-versa - shilp-server pods can tolerate shilp-specific taints
tolerations: []
# Example: Tolerate nodes tainted for shilp-server workloads
# - key: "app"
#   operator: "Equal"
#   value: "shilp-server"
#   effect: "NoSchedule"
# Example: Tolerate dedicated nodes
# - key: "dedicated"
#   operator: "Equal"
#   value: "shilp"
#   effect: "NoExecute"

affinity: {}

# Environment variables for Shilp Server
env:
  # AWS Configuration
  aws:
    # If true, use AWS S3 for storage (no persistent volume needed)
    # If false, use local filesystem (requires persistent volume)
    enableStorage: "false"
    region: "ap-south-1"
    s3UploadBucket: ""
    s3DbBucket: ""
    enableEmbeddingModels: "false"
    defaultEmbeddingModel: ""
  
  # Metrics Configuration
  enableMetrics: "true"
  
  # Auto-load collections on startup
  autoLoadCollections: ""

  # Shilp file path
  shilpFilePath: "/data/shilp"

  # Upload file path
  uploadFilePath: "/data/upload"

  # Disable automatic documentation creation
  logLevel: "info"

# AWS Credentials (should be stored in Kubernetes secrets)
# Create a secret with: kubectl create secret generic shilp-server-aws-credentials \
#   --from-literal=accessKeyId=YOUR_ACCESS_KEY \
#   --from-literal=secretAccessKey=YOUR_SECRET_KEY
# awsCredentials:
#   existingSecret: "shilp-server-aws-credentials"
#   accessKeyIdKey: "accessKeyId"
#   secretAccessKeyKey: "secretAccessKey"

# Persistent Volume Configuration
# Only used when aws.enableStorage is false
persistence:
  enabled: true
  # existingClaim: ""
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  # mountPath where the data will be stored
  mountPath: /data
  # Annotations for the PVC
  annotations: {}
