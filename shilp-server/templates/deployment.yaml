apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shilp-server.fullname" . }}
  labels:
    {{- include "shilp-server.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "shilp-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "shilp-server.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "shilp-server.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        env:
        # AWS Configuration
        - name: AWS_ENABLE_STORAGE
          valueFrom:
            configMapKeyRef:
              name: {{ include "shilp-server.fullname" . }}
              key: aws-enable-storage
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: {{ include "shilp-server.fullname" . }}
              key: aws-region
        - name: AWS_DEFAULT_REGION
          valueFrom:
            configMapKeyRef:
              name: {{ include "shilp-server.fullname" . }}
              key: aws-region
        - name: AWS_S3_UPLOAD_BUCKET
          valueFrom:
            configMapKeyRef:
              name: {{ include "shilp-server.fullname" . }}
              key: aws-s3-upload-bucket
        - name: AWS_S3_DB_BUCKET
          valueFrom:
            configMapKeyRef:
              name: {{ include "shilp-server.fullname" . }}
              key: aws-s3-db-bucket
        - name: ENABLE_METRICS
          valueFrom:
            configMapKeyRef:
              name: {{ include "shilp-server.fullname" . }}
              key: enable-metrics
        - name: AUTO_LOAD_COLLECTIONS
          valueFrom:
            configMapKeyRef:
              name: {{ include "shilp-server.fullname" . }}
              key: auto-load-collections
        - name: SHILP_FILE_PATH
          valueFrom:
            configMapKeyRef:
              name: {{ include "shilp-server.fullname" . }}
              key: shilp-file-path
        - name: UPLOAD_FILE_PATH
          valueFrom:
            configMapKeyRef:
              name: {{ include "shilp-server.fullname" . }}
              key: upload-file-path
        - name: AWS_DEFAULT_EMBEDDING_MODEL
          valueFrom:
            configMapKeyRef:
              name: {{ include "shilp-server.fullname" . }}
              key: aws-default-embedding-model
        - name: AWS_ENABLE_EMBEDDING_MODELS
          valueFrom:
            configMapKeyRef:
              name: {{ include "shilp-server.fullname" . }}
              key: aws-enable-embedding-models
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: {{ include "shilp-server.fullname" . }}
              key: log-level
        {{- if and .Values.awsCredentials .Values.awsCredentials.existingSecret }}
        # AWS Credentials from Secret
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Values.awsCredentials.existingSecret }}
              key: {{ .Values.awsCredentials.accessKeyIdKey }}
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.awsCredentials.existingSecret }}
              key: {{ .Values.awsCredentials.secretAccessKeyKey }}
        - name: SETTINGS_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.server.shilp-server-credentials }}
              key: {{ .Values.server.encryptKeyKey }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: {{ .Values.livenessProbe.httpGet.path | quote }}
            port: {{ .Values.livenessProbe.httpGet.port }}
          initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.livenessProbe.failureThreshold }}

        readinessProbe:
          httpGet:
            path: {{ .Values.readinessProbe.httpGet.path | quote }}
            port: {{ .Values.readinessProbe.httpGet.port }}
          initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        volumeMounts:
        {{- if and .Values.persistence.enabled (ne .Values.env.aws.enableStorage "true") }}
        - name: data
          mountPath: {{ .Values.persistence.mountPath }}
        {{- end }}
        {{- with .Values.volumeMounts }}
        {{- toYaml . | nindent 12 }}
        {{- end }}
      volumes:
      {{- if and .Values.persistence.enabled (ne .Values.env.aws.enableStorage "true") }}
      - name: data
        persistentVolumeClaim:
          claimName: {{ if .Values.persistence.existingClaim }}{{ .Values.persistence.existingClaim }}{{- else }}{{ include "shilp-server.fullname" . }}{{- end }}
      {{- end }}
      {{- with .Values.volumes }}
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
